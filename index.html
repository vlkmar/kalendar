<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsahový kalendář — naplánuj si měsíc obsahu | Marian Vlk</title>
<meta name="description" content="Zdarma nástroj: navol si pilíře obsahu, rozvrhni měsíc a vytiskni si plán. Bez registrace, bez ukládání.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>/* CSS v Tasku 3 */</style>
</head>
<body>
<script>
/* LOGIC-START */
'use strict';

var PILLAR_COLORS = ['#02628C', '#015C4C', '#3F5C01', '#6413FC', '#015C1E', '#4F5151'];
var FUNNEL = { dosah: 'Dosah', duvera: 'Důvěra', prodej: 'Prodej' };
var FORMATS = { video: 'Video', carousel: 'Carousel', text: 'Textový příspěvek' };
var MAX_PILLARS = 6;
var DEFAULT_COUNT = 4;

function defaultViewMonth(todayIso) {
  const [y, m] = todayIso.split('-').map(Number);
  const ny = m === 12 ? y + 1 : y;
  const nm = m === 12 ? 1 : m + 1;
  return ny + '-' + String(nm).padStart(2, '0');
}

function createState(todayIso) {
  return { pillars: [], cards: [], viewMonth: defaultViewMonth(todayIso), _seq: 0 };
}

function addPillar(state) {
  if (state.pillars.length >= MAX_PILLARS) return null;
  const used = new Set(state.pillars.map(p => p.color));
  const color = PILLAR_COLORS.find(c => !used.has(c));
  const pillar = { id: ++state._seq, name: '', funnel: 'dosah', count: DEFAULT_COUNT, color };
  state.pillars.push(pillar);
  return pillar;
}

function getPillar(state, id) {
  return state.pillars.find(p => p.id === id) || null;
}

function renamePillar(state, id, name) {
  const p = getPillar(state, id);
  if (p) p.name = name;
}

function setFunnel(state, id, funnel) {
  const p = getPillar(state, id);
  if (p && FUNNEL[funnel]) p.funnel = funnel;
}

function placedCount(state, pillarId) {
  return state.cards.filter(c => c.pillarId === pillarId && c.date !== null).length;
}

function canDec(state, id) {
  const p = getPillar(state, id);
  if (!p) return false;
  return p.count > Math.max(1, placedCount(state, id));
}

function incCount(state, id) {
  const p = getPillar(state, id);
  if (p) p.count += 1;
}

function decCount(state, id) {
  if (!canDec(state, id)) return false;
  getPillar(state, id).count -= 1;
  return true;
}

function removePillar(state, id) {
  const removedPlaced = placedCount(state, id);
  state.pillars = state.pillars.filter(p => p.id !== id);
  state.cards = state.cards.filter(c => c.pillarId !== id);
  return { removedPlaced };
}

function syncCards(state) {
  for (const p of state.pillars) {
    const mine = state.cards.filter(c => c.pillarId === p.id);
    let diff = p.count - mine.length;
    while (diff > 0) {
      state.cards.push({ id: ++state._seq, pillarId: p.id, idea: '', format: null, date: null });
      diff -= 1;
    }
    if (diff < 0) {
      const removable = mine.filter(c => c.date === null).slice(diff); // posledních |diff| neumístěných
      const ids = new Set(removable.map(c => c.id));
      state.cards = state.cards.filter(c => !ids.has(c.id));
    }
  }
}

function namedPillars(state) {
  return state.pillars.filter(p => p.name.trim().length > 0);
}

var MONTHS_CZ = ['Leden', 'Únor', 'Březen', 'Duben', 'Květen', 'Červen', 'Červenec', 'Srpen', 'Září', 'Říjen', 'Listopad', 'Prosinec'];
var FUNNEL_ORDER = ['dosah', 'duvera', 'prodej'];

function addMonths(ym, delta) {
  const [y, m] = ym.split('-').map(Number);
  const idx = m - 1 + delta;
  const ny = y + Math.floor(idx / 12);
  const nm = ((idx % 12) + 12) % 12 + 1;
  return ny + '-' + String(nm).padStart(2, '0');
}

function monthMeta(ym) {
  const [y, m] = ym.split('-').map(Number);
  const days = new Date(Date.UTC(y, m, 0)).getUTCDate();
  const offset = (new Date(Date.UTC(y, m - 1, 1)).getUTCDay() + 6) % 7; // 0 = pondělí
  return { label: MONTHS_CZ[m - 1] + ' ' + y, days, offset, year: y, month: m };
}

function monthGrid(ym) {
  const { days, offset } = monthMeta(ym);
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(null);
  for (let d = 1; d <= days; d++) {
    cells.push({ iso: ym + '-' + String(d).padStart(2, '0'), day: d });
  }
  return cells;
}

function pillarLabel(state, pillar) {
  return pillar.name.trim() || 'Pilíř ' + (state.pillars.indexOf(pillar) + 1);
}

function funnelBreakdown(state) {
  const counts = { dosah: 0, duvera: 0, prodej: 0 };
  for (const p of state.pillars) counts[p.funnel] += p.count;
  const total = counts.dosah + counts.duvera + counts.prodej;
  let rows = FUNNEL_ORDER.map(f => ({ funnel: f, count: counts[f], pct: 0, rem: 0 }));
  if (total > 0) {
    for (const r of rows) {
      const exact = r.count * 100 / total;
      r.pct = Math.floor(exact);
      r.rem = exact - r.pct;
    }
    let leftover = 100 - rows.reduce((s, r) => s + r.pct, 0);
    const byRem = [...rows].sort((a, b) => b.rem - a.rem || FUNNEL_ORDER.indexOf(a.funnel) - FUNNEL_ORDER.indexOf(b.funnel));
    for (let i = 0; leftover > 0; i = (i + 1) % byRem.length, leftover--) byRem[i].pct += 1;
  }
  return { total, rows: rows.map(({ funnel, count, pct }) => ({ funnel, count, pct })) };
}

function guardrails(state) {
  const out = [];
  const fb = funnelBreakdown(state);
  const prodej = fb.rows.find(r => r.funnel === 'prodej');
  if (fb.total > 0 && prodej.count / fb.total > 0.15) {
    out.push({
      id: 'prodej-high',
      message: 'Prodej máš přes 15 %. Osvědčený poměr: na zhruba deset kusů, kde jen dáváš, patří jeden, kde si o něco říkáš.'
    });
  }
  const low = state.pillars.filter(p => p.count < 4);
  if (low.length > 0) {
    out.push({
      id: 'pillar-low',
      message: low.map(p => pillarLabel(state, p)).join(', ') + ': méně než 4 kusy za měsíc. Z tak malého vzorku nepoznáš, jestli pilíř funguje.'
    });
  }
  const days = monthMeta(state.viewMonth).days;
  if (fb.total > days) {
    out.push({
      id: 'over-days',
      message: 'Máš naplánováno víc kusů (' + fb.total + ') než má měsíc dní (' + days + '). Nech si rezervu, nebo něco uber.'
    });
  }
  return out;
}

function getCard(state, id) {
  return state.cards.find(c => c.id === id) || null;
}

function placeCard(state, cardId, iso) {
  const c = getCard(state, cardId);
  if (c) c.date = iso;
}

function unplaceCard(state, cardId) {
  const c = getCard(state, cardId);
  if (c) c.date = null;
}

function setIdea(state, cardId, text) {
  const c = getCard(state, cardId);
  if (c) c.idea = text;
}

function setFormat(state, cardId, f) {
  const c = getCard(state, cardId);
  if (c) c.format = (f === null || FORMATS[f]) ? f : c.format;
}

function trayCards(state) {
  const order = new Map(state.pillars.map((p, i) => [p.id, i]));
  return state.cards
    .filter(c => c.date === null)
    .sort((a, b) => (order.get(a.pillarId) - order.get(b.pillarId)) || (a.id - b.id));
}

function placedForDate(state, iso) {
  return state.cards.filter(c => c.date === iso).sort((a, b) => a.id - b.id);
}

function progress(state) {
  return { placed: state.cards.filter(c => c.date !== null).length, total: state.cards.length };
}

function isDirty(state) {
  return namedPillars(state).length > 0
    || state.cards.some(c => c.date !== null)
    || state.cards.some(c => c.idea.trim().length > 0);
}
/* LOGIC-END */
/* UI v Tasku 4+ */
</script>
</body>
</html>
